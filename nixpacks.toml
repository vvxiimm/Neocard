[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@8.15.3 --activate && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm db:generate",
  "pnpm --filter @nexus/api build"
]

[start]
cmd = "cd apps/api && pnpm db:push && node dist/main.js"